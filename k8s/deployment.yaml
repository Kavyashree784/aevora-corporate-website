apiVersion: apps/v1
kind: Deployment
metadata:
  name: aevora-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: aevora

  template:
    metadata:
      labels:
        app: aevora

    spec:
      containers:
      - name: aevora
        image: aevora-app:latest
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        ports:
        - containerPort: 80